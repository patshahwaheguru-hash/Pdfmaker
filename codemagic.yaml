workflows:
  android-release:
    name: Android Release Build
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      flutter: 3.22.3  # Force latest stable
      xcode: latest
    scripts:
      - name: Clean project
        script: |
          flutter clean
          flutter pub get
      - name: Build AAB
        script: flutter build appbundle --release
    artifacts:
      - build/app/outputs/bundle/release/*.aab
    cache:
      cache_paths:
        - ~/.pub-cache
